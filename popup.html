<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AD'IOS</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">

    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Fond circulaire -->
          <circle cx="16" cy="16" r="15" fill="#111" stroke="#ff3d3d" stroke-width="1.5"/>
          <!-- A stylisé -->
          <path d="M10 22 L16 10 L22 22" stroke="#ff3d3d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <line x1="12.5" y1="18" x2="19.5" y2="18" stroke="#ff3d3d" stroke-width="1.5" stroke-linecap="round"/>
          <!-- Apostrophe -->
          <circle cx="23" cy="11" r="1.5" fill="#ffffff"/>
          <!-- Slash "skip" -->
          <line x1="25" y1="9" x2="21" y2="14" stroke="#ff3d3d" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">AD'IOS</span>
      </div>
      <div class="badge" id="status-badge">ACTIF</div>
    </header>

    <section class="stats-grid">
      <div class="stat-card">
        <span class="stat-value" id="stat-skipped">0</span>
        <span class="stat-label">Pubs évitées</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-session">—</span>
        <span class="stat-label" id="stat-session-label">Session</span>
      </div>
    </section>

    <section class="legend">
      <div class="legend-item">
        <span class="dot green"></span><span>Skip button</span>
      </div>
      <div class="legend-item">
        <span class="dot orange"></span><span>Fast-forward</span>
      </div>
      <div class="legend-item">
        <span class="dot red"></span><span>Turbo ×16</span>
      </div>
    </section>

    <section class="log-section">
      <div class="log-header">
        <span class="log-title">Journal</span>
        <button class="clear-btn" id="clear-log">Effacer</button>
      </div>
      <div class="log-list" id="log-list">
        <div class="log-empty">En attente de publicités…</div>
      </div>
    </section>

    <footer class="footer">
      <span class="footer-brand">AD'IOS v2.0</span>
      <span class="footer-sep">·</span>
      <span>Chrome · Opera · Edge</span>
      <span class="footer-sep">·</span>
      <span>100% local</span>
    </footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
